<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>PesquisAI</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg0:#0b0d0f;--bg1:#131618;--bg2:#191e21;--bg3:#1f262a;--bg4:#263035;
  --fg0:#dde4e8;--fg1:#7e8f97;--fg2:#4a5a62;
  --blue:#4fc3f7;--bdim:rgba(79,195,247,.12);--bb:rgba(79,195,247,.25);
  --green:#5dba7e;--amber:#e8b84b;--red:#e07070;--cyan:#56ccd8;--purple:#a47de0;
  --r:6px;
}
html,body{height:100%;background:var(--bg0);color:var(--fg0);font-family:"DM Mono",monospace;overflow:hidden}
#topbar{height:48px;background:var(--bg1);border-bottom:1px solid rgba(255,255,255,.06);display:flex;align-items:center;padding:0 18px;gap:14px;z-index:10;}
.logo-p{font-family:"Syne",sans-serif;font-weight:800;font-size:17px;color:var(--fg0);letter-spacing:-.4px}
.logo-ai{font-family:"Syne",sans-serif;font-weight:700;font-size:17px;color:var(--blue);letter-spacing:-.4px}
.vtag{font-size:10px;color:var(--fg2);padding:2px 6px;border:1px solid rgba(255,255,255,.08);border-radius:4px;margin-left:8px}
.status{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--fg2)}
.sdot{width:6px;height:6px;border-radius:50%;background:var(--fg2)}
.sdot.on{background:var(--green);animation:pulse 2.4s ease infinite}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(93,186,126,.5)}50%{box-shadow:0 0 0 4px rgba(93,186,126,0)}}
.sep{flex:1}
.dbtn{display:inline-flex;align-items:center;gap:6px;height:30px;padding:0 12px;font-family:"DM Mono",monospace;font-size:11px;color:var(--fg1);text-decoration:none;background:transparent;border:1px solid rgba(255,255,255,.1);border-radius:var(--r);transition:.15s}
.dbtn:hover{background:rgba(255,255,255,.05);color:var(--fg0)}
#layout{display:flex;height:calc(100vh - 48px)}
#sidebar{width:220px;flex-shrink:0;background:var(--bg1);border-right:1px solid rgba(255,255,255,.05);display:flex;flex-direction:column}
.sb-sect{padding:10px 14px 4px;font-size:10px;color:var(--fg2);letter-spacing:.1em;text-transform:uppercase}
.sb-item{display:flex;align-items:center;gap:8px;padding:7px 14px;font-size:12px;color:var(--fg1);cursor:pointer;border-left:2px solid transparent;transition:.12s;user-select:none}
.sb-item:hover{background:rgba(255,255,255,.03);color:var(--fg0)}
.sb-item.active{background:var(--bdim);color:var(--blue);border-left-color:var(--blue)}
.sb-item .lbl{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.sb-item .del{opacity:0;font-size:11px;color:var(--fg2);padding:1px 4px;border-radius:3px}
.sb-item:hover .del{opacity:1}
.sb-item .del:hover{background:rgba(224,112,112,.15);color:var(--red)}
.sb-spacer{flex:1}
.sb-footer{padding:10px 14px;border-top:1px solid rgba(255,255,255,.05);font-size:10px;color:var(--fg2)}
.sb-model{color:var(--cyan);margin-top:2px}
#nsb{margin:10px;padding:8px;border-radius:var(--r);background:transparent;border:1px dashed rgba(255,255,255,.1);color:var(--fg2);font-family:"DM Mono",monospace;font-size:11px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px;transition:.15s}
#nsb:hover{border-color:var(--bb);color:var(--blue);background:var(--bdim)}
#main{flex:1;display:flex;flex-direction:column;overflow:hidden}
#msgs{flex:1;overflow-y:auto;padding:24px 0;scroll-behavior:smooth}
#msgs::-webkit-scrollbar{width:4px}
#msgs::-webkit-scrollbar-thumb{background:var(--bg4);border-radius:2px}
.mw{max-width:760px;margin:0 auto;padding:0 24px 20px}
.mu{display:flex;justify-content:flex-end}
.mu .b{max-width:72%;background:var(--bdim);border:1px solid var(--bb);border-radius:var(--r) var(--r) 2px var(--r);padding:10px 14px;font-size:13px;line-height:1.65;white-space:pre-wrap;word-break:break-word}
.ma .sender{font-size:10px;color:var(--blue);letter-spacing:.05em;margin-bottom:6px;display:flex;align-items:center;gap:6px}
.ma .sender::after{content:"";flex:1;height:1px;background:rgba(255,255,255,.05)}
.ma .ct{font-size:13px;line-height:1.75;white-space:pre-wrap;word-break:break-word}
.ma .ct code{font-family:"DM Mono",monospace;font-size:12px;background:var(--bg2);border:1px solid rgba(255,255,255,.07);border-radius:3px;padding:1px 5px;color:var(--green)}
.ma .ct pre{background:var(--bg1);border:1px solid rgba(255,255,255,.07);border-radius:var(--r);padding:12px 14px;margin:.75em 0;overflow-x:auto}
.ma .ct pre code{background:none;border:none;padding:0;color:var(--fg0)}
.tool{display:flex;align-items:center;gap:8px;background:rgba(164,125,224,.07);border:1px solid rgba(164,125,224,.18);border-radius:var(--r);padding:7px 12px;margin:.5em 0;font-size:11.5px;color:var(--purple)}
.tool .sp{width:10px;height:10px;border-radius:50%;border:1.5px solid transparent;border-top-color:var(--purple);animation:spin .7s linear infinite}
.tool.done{color:var(--green);border-color:rgba(93,186,126,.2);background:rgba(93,186,126,.06)}
.tool.done .sp{border-top-color:var(--green);animation:none;border-color:var(--green)}
@keyframes spin{to{transform:rotate(360deg)}}
.thinking{font-size:11px;color:var(--amber);padding:5px 0;display:flex;align-items:center;gap:6px}
.dots span{animation:blink 1.2s infinite}
.dots span:nth-child(2){animation-delay:.2s}
.dots span:nth-child(3){animation-delay:.4s}
@keyframes blink{0%,80%,100%{opacity:0}40%{opacity:1}}
#empty{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;padding:40px}
.elogo{font-family:"Syne",sans-serif;font-weight:800;font-size:32px;letter-spacing:-.5px}
.elogo span{color:var(--blue)}
.esub{font-size:12px;color:var(--fg2);text-align:center;max-width:320px;line-height:1.7}
.suggs{display:flex;flex-direction:column;gap:8px;width:100%;max-width:440px;margin-top:8px}
.sg{padding:10px 14px;border-radius:var(--r);border:1px solid rgba(255,255,255,.08);font-size:12px;color:var(--fg1);cursor:pointer;text-align:left;background:transparent;font-family:"DM Mono",monospace;transition:.15s}
.sg:hover{border-color:var(--bb);color:var(--blue);background:var(--bdim)}
#ibar{border-top:1px solid rgba(255,255,255,.06);padding:12px 16px;background:var(--bg1);display:flex;align-items:flex-end;gap:10px}
#inp{flex:1;background:var(--bg2);border:1px solid rgba(255,255,255,.08);border-radius:var(--r);padding:10px 14px;font-family:"DM Mono",monospace;font-size:13px;color:var(--fg0);caret-color:var(--blue);resize:none;min-height:42px;max-height:160px;line-height:1.5;outline:none;transition:border-color .15s}
#inp:focus{border-color:var(--bb)}
#inp::placeholder{color:var(--fg2)}
#snd{width:36px;height:36px;border-radius:var(--r);background:var(--blue);border:none;color:#0b0d0f;cursor:pointer;font-size:16px;transition:.15s;align-self:flex-end}
#snd:hover{filter:brightness(1.1)}
#snd:disabled{opacity:.35;cursor:not-allowed}
#stbar{height:20px;background:var(--bg1);border-top:1px solid rgba(255,255,255,.04);display:flex;align-items:center;padding:0 14px;gap:16px;font-size:10px;color:var(--fg2)}
.sbl{color:var(--blue)}
.sml{margin-left:auto}
#toast{position:fixed;bottom:24px;right:24px;z-index:999;background:var(--bg3);border:1px solid rgba(255,255,255,.1);border-radius:var(--r);padding:10px 16px;font-size:12px;opacity:0;transform:translateY(8px);transition:.25s;pointer-events:none}
#toast.show{opacity:1;transform:translateY(0)}
</style>
</head>
<body>
<div id="topbar">
  <span class="logo-p">Pesquis</span><span class="logo-ai">AI</span>
  <span class="vtag">v1.0</span>
  <div class="status"><span class="sdot" id="sdot"></span><span id="stxt">conectando...</span></div>
  <div class="sep"></div>
  <a id="dlink" href="#" target="_blank" class="dbtn">📁 Drive</a>
</div>
<div id="layout">
  <div id="sidebar">
    <button id="nsb" onclick="newSess()">+ nova sessão</button>
    <div class="sb-sect">Sessões</div>
    <div id="slist"></div>
    <div class="sb-spacer"></div>
    <div class="sb-footer"><div>Agente</div><div class="sb-model">PesquisAI</div></div>
  </div>
  <div id="main">
    <div id="empty">
      <div class="elogo">Pesquis<span>AI</span></div>
      <div class="esub">Assistente de pesquisa científica com dados do IBGE e DataSUS.</div>
      <div class="suggs">
        <button class="sg" onclick="sug(this)">Quais municípios têm maior mortalidade por dengue em MG?</button>
        <button class="sg" onclick="sug(this)">Faça uma revisão bibliográfica sobre CRISPR-Cas9</button>
        <button class="sg" onclick="sug(this)">Dados do IBGE: população de Minas Gerais por município</button>
        <button class="sg" onclick="sug(this)">Compare métodos para dados longitudinais em saúde</button>
      </div>
    </div>
    <div id="msgs" style="display:none"></div>
    <div id="ibar">
      <textarea id="inp" rows="1" placeholder="Faça uma pergunta de pesquisa..." oninput="ar(this)" onkeydown="ok(event)"></textarea>
      <button id="snd" onclick="send()">↑</button>
    </div>
    <div id="stbar"><span class="sbl">PesquisAI</span><span id="ssn">sem sessão</span><span class="sml" id="stok"></span></div>
  </div>
</div>
<div id="toast"></div>
<script>
const API="__API__";
document.getElementById("dlink").href="__DRIVE__";
let cur=null,sess={},busy=false,buf="";

async function req(m,p,b){
  const r=await fetch(API+p,{method:m,headers:{"Content-Type":"application/json"},body:b?JSON.stringify(b):undefined});
  if(!r.ok)throw new Error(await r.text());
  return r.json();
}
async function init(){
  try{await req("GET","/global/health");setOk(true);}catch{setTimeout(init,2000);return;}
  try{const l=await req("GET","/session");renderSess(l);if(l.length)selSess(l[0].id);}catch(e){console.error(e);}
  globalEvt();
}
function setOk(ok){
  document.getElementById("sdot").className="sdot"+(ok?" on":"");
  document.getElementById("stxt").textContent=ok?"agente ativo":"conectando...";
}
function renderSess(list){
  const el=document.getElementById("slist");el.innerHTML="";
  list.forEach(s=>{
    sess[s.id]=s;
    const d=document.createElement("div");
    d.className="sb-item"+(s.id===cur?" active":"");
    d.dataset.id=s.id;
    d.innerHTML='<span class="lbl">'+esc(s.title||"Nova sessão")+'</span><span class="del" onclick="delS(event,\''+s.id+'\')">✕</span>';
    d.onclick=e=>{if(!e.target.classList.contains("del"))selSess(s.id);};
    el.appendChild(d);
  });
}
async function newSess(){
  try{const s=await req("POST","/session",{});sess[s.id]=s;await refSess();selSess(s.id);}
  catch{toast("Erro ao criar sessão");}
}
async function delS(e,id){
  e.stopPropagation();if(!confirm("Apagar sessão?"))return;
  await req("DELETE","/session/"+id);
  if(cur===id){cur=null;showEmpty(true);}await refSess();
}
async function refSess(){const l=await req("GET","/session");renderSess(l);}
function selSess(id){
  cur=id;
  document.querySelectorAll(".sb-item").forEach(el=>el.classList.toggle("active",el.dataset.id===id));
  document.getElementById("ssn").textContent=sess[id]?.title||"Nova sessão";
  loadMsgs(id);
}
async function loadMsgs(sid){
  showEmpty(false);const msgs=document.getElementById("msgs");msgs.innerHTML="";
  try{const l=await req("GET","/session/"+sid+"/message");l.forEach(m=>renderMsg(m));scrollB();}catch{}
}
function renderMsg(m){
  const msgs=document.getElementById("msgs");
  const w=document.createElement("div");w.className="mw";
  if(m.role==="user"){
    const t=m.parts&&m.parts.find(function(p){return p.type==="text"});
    w.innerHTML='<div class="mu"><div class="b">'+esc((t&&t.text)||"")+'</div></div>';
  }else{
    let h='<div class="ma"><div class="sender">PesquisAI</div><div class="ct">';
    (m.parts||[]).forEach(function(p){
      if(p.type==="text")h+=fmtMd(p.text);
      else if(p.type==="tool-invocation")h+=toolHtml(p);
    });
    h+='</div></div>';w.innerHTML=h;
  }
  msgs.appendChild(w);
}
function toolHtml(p){
  var done=p.state==="result";
  return '<div class="tool '+(done?"done":"")+'" data-tid="'+p.toolCallId+'"><span class="sp"></span>'+esc(p.toolName||"tool")+'</div>';
}
function fmtMd(t){
  var s=esc(t);
  // code blocks
  s=s.replace(/```[\s\S]*?```/g,function(m){return "<pre><code>"+m.slice(3,-3)+"</code></pre>";});
  // inline code
  s=s.replace(/`([^`]+)`/g,"<code>$1</code>");
  // bold
  s=s.replace(/\*\*([^*]+)\*\*/g,"<strong>$1</strong>");
  // newlines
  s=s.replace(/\n/g,"<br>");
  return s;
}
function esc(s){return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}
async function send(){
  if(busy)return;
  var inp=document.getElementById("inp");var t=inp.value.trim();if(!t)return;
  if(!cur){await newSess();if(!cur)return;}
  inp.value="";ar(inp);showEmpty(false);busy=true;document.getElementById("snd").disabled=true;
  addUserBubble(t);var bid="ai-"+Date.now();addAiBubble(bid);
  try{
    var es=new EventSource(API+"/session/"+cur+"/event");
    es.onmessage=function(e){try{handleEvt(JSON.parse(e.data),bid,es);}catch(err){}};
    es.onerror=function(){es.close();done();};
    await req("POST","/session/"+cur+"/message",{parts:[{type:"text",text:t}]});
  }catch(err){toast("Erro ao enviar");done();}
}
function addUserBubble(t){
  var msgs=document.getElementById("msgs");var w=document.createElement("div");
  w.className="mw";w.innerHTML='<div class="mu"><div class="b">'+esc(t)+'</div></div>';
  msgs.appendChild(w);scrollB();
}
function addAiBubble(id){
  var msgs=document.getElementById("msgs");var w=document.createElement("div");
  w.className="mw";w.id=id;
  w.innerHTML='<div class="ma"><div class="sender">PesquisAI</div><div class="ct" id="ct-'+id+'"><span class="thinking">Pensando<span class="dots"><span>.</span><span>.</span><span>.</span></span></span></div></div>';
  msgs.appendChild(w);scrollB();
}
function handleEvt(data,bid,es){
  var ct=document.getElementById("ct-"+bid);if(!ct)return;
  if(data.type==="message.part.updated"||data.type==="message.part.added"){
    var p=data.part;
    if(p&&p.type==="text"){buf+=p.text||"";ct.innerHTML=fmtMd(buf);scrollB();}
    else if(p&&p.type==="tool-invocation"){
      var ex=ct.querySelector('[data-tid="'+p.toolCallId+'"]');
      var h=toolHtml(p);
      if(ex)ex.outerHTML=h;else ct.insertAdjacentHTML("beforeend",h);scrollB();
    }
  }
  if(data.type==="message.completed"||data.type==="session.idle"){es.close();buf="";done();refSess();}
}
function done(){busy=false;document.getElementById("snd").disabled=false;}
function globalEvt(){
  var s=new EventSource(API+"/global/event");
  s.onopen=function(){setOk(true);};
  s.onerror=function(){setOk(false);setTimeout(globalEvt,5000);s.close();};
}
function showEmpty(show){
  document.getElementById("empty").style.display=show?"flex":"none";
  document.getElementById("msgs").style.display=show?"none":"block";
}
function scrollB(){var m=document.getElementById("msgs");m.scrollTop=m.scrollHeight;}
function ar(el){el.style.height="auto";el.style.height=Math.min(el.scrollHeight,160)+"px";}
function ok(e){if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();send();}}
function sug(b){document.getElementById("inp").value=b.textContent;send();}
function toast(msg){var t=document.getElementById("toast");t.textContent=msg;t.classList.add("show");setTimeout(function(){t.classList.remove("show");},3000);}
init();
</script>
</body>
</html>
